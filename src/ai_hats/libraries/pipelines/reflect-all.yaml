name: reflect-all
steps:
  - id: compose_role
  - id: resolve_prompt
    params: {default_text: ""}
  - id: launch_provider
  - id: extract_marker
    params: {start: BEGIN_JUDGE, end: END_JUDGE, out_key: judge_report}
  - id: save_artifact
    params:
      key: judge_report
      out_path_template: ".agent/retrospectives/judge/{ts}-report.md"
