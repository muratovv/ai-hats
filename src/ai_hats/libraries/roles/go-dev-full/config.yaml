name: go-dev-full
priorities:
  - Correctness
  - Simplicity
  - Performance
composition:
  traits:
    - trait-base
    - trait-agent
    - trait-se-mindset
    - dev::go-core
    - dev::go-database
    - dev::go-grpc
    - dev::go-cli
    - dev::go-observability
    - dev::go-performance
    - dev::go-security
    - dev::go-di
    - dev::go-samber
    - dev::go-testing-extended
    - dev::go-ci
  rules: []
  skills: []
  hooks:
    session_start: []
    session_end: []
    task_complete:
      - go vet ./...
      - go test -race ./...
      - golangci-lint run ./...
      - go build ./...
      - govulncheck ./...
  mcp: []
injection: |
  # ROLE: GO DEVELOPER (FULL)

  Comprehensive Go developer profile with all applied traits enabled:
  database, gRPC, CLI, observability, performance, security, DI,
  samber ecosystem, testing, CI/CD. Use this when the project touches
  multiple domains. For minimal context, use `go-dev` instead.
