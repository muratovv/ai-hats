name: backlog-create
description: Narrow shim for filing tasks via `ai-hats task create` from L1 analyst roles (no transitions, no hyp/proposal)
author: ai-hats
tags: [agent-protocol, task-management, narrow-shim]
pattern: orchestrator

triggers:
  - "L1 analyst role needs to file a fix task or follow-up from a finding"
  - "role's mutation policy whitelists task create but forbids transitions and hyp/proposal"
skip:
  - "role drives full task lifecycle (transitions, work-log cadence) — use backlog-manager instead"
  - "hypothesis or proposal mutations — out of scope"
