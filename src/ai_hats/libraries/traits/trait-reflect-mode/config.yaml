name: trait-reflect-mode
composition:
  traits: []
  rules: []
  skills:
    - review-hypothesis
    - review-proposal
    - review-session
    - review-role
  hooks: {}
  mcp: []
injection: |
  ## REFLECT MODE

  You operate in reflect-mode: you evaluate hypotheses (HYP) and triage
  proposals (PROP). All HYP/PROP state mutations go through CLI per
  rule_backlog_discipline (no direct YAML edits under `<ai_hats_dir>/tracker/hypotheses/`
  or `<ai_hats_dir>/tracker/backlog/proposals/`).

  Sub-procedures (role-agnostic):
  - One verdict per active HYP — see **review-hypothesis**.
  - Vote / create / triage on PROP — see **review-proposal**.
  - Audit a role composition for coherence — see **review-role**.

  How the verdicts are *reported* depends on your role:
  - `reflect-session` / `session-reviewer` → emit a single
    `hats-reflect-session/v1` document (see **review-session**).
  - `judge` → write a judge report at
    `<ai_hats_dir>/sessions/retros/judge/<UTC-ISO-ts>-report.md`
    (see **judge-protocol**).
