name: release

# Publish to PyPI on a version-tag push (vX.Y.Z) via OIDC trusted publishing —
# no stored API token. Build and publish are split into two jobs so the
# id-token privilege is only ever exposed to a job that does nothing but
# download the prebuilt dist and upload it (least privilege).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build (uv build → sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # setuptools-scm derives the version from git tags; a shallow checkout
          # stamps a 0.0.dev fallback instead of the clean release version.
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build sdist + wheel
        run: uv build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish (PyPI trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # The trusted-publisher trust is scoped to this environment on the PyPI side
    # (pending-publisher: repo muratovv/ai-hats, workflow release.yml, env pypi).
    environment: pypi
    permissions:
      # OIDC token for trusted publishing — the ONLY privilege this job holds.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
