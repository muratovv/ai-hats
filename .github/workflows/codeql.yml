name: codeql

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "23 6 * * 1"  # Mondays 06:23 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-extended (not security-and-quality): the maintainability
          # query family (unused-import, cyclic-import, unreachable, empty-except)
          # false-positives on this project's idioms — noqa'd re-export hubs,
          # TYPE_CHECKING/deferred cycle-management, documented SIGINT scaffolds.
          # Module-level runtime cycles + leaf purity are gated locally instead
          # (tests/test_import_hygiene.py, HATS-758).
          queries: security-extended
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
