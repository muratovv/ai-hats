name: release-packages

# Publish the workspace packages (ai-hats-core, ai-hats-wt, ai-hats-tracker) to PyPI via OIDC
# trusted publishing — no stored API token. Manual trigger: these packages carry
# their own static versions in packages/*/pyproject.toml, decoupled from the
# ai-hats `v*` release tag (release.yml). To cut a package release: bump the
# version in its pyproject.toml, merge to master, then run this workflow.
#
# Build and publish are split so id-token: write is held only by the publish
# job. Each package publishes from its own dist dir (unambiguous per-project
# upload; core first, then the wt package that depends on it).
on:
  workflow_dispatch:
  # HATS-943 #3: auto-publish when a workspace package version bump lands on
  # master, so bump⇒publish is one step, not two (the HATS-928 lag). Safe on a
  # non-version edit: `skip-existing` no-ops an already-published version.
  push:
    branches: [master]
    paths:
      - "packages/*/pyproject.toml"

permissions:
  contents: read

jobs:
  build:
    name: build (ai-hats-core + ai-hats-wt + ai-hats-tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build all packages
        run: |
          uv build packages/ai-hats-core -o dist-core
          uv build packages/ai-hats-wt -o dist-wt
          uv build packages/ai-hats-tracker -o dist-tracker
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-dist
          path: |
            dist-core/
            dist-wt/
            dist-tracker/
          if-no-files-found: error

  # Split per package with a DISTINCT environment each: PyPI forbids two PENDING
  # trusted publishers sharing one (repo, workflow, environment) tuple, so the
  # environment is the disambiguator (see docs/RELEASING.md). id-token: write is
  # held only by these publish jobs.
  publish-core:
    name: publish ai-hats-core (PyPI trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-core
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: packages-dist
      - name: Publish ai-hats-core to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-core/
          skip-existing: true

  publish-wt:
    name: publish ai-hats-wt (PyPI trusted publishing)
    # Core first — ai-hats-wt depends on it.
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi-wt
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: packages-dist
      - name: Publish ai-hats-wt to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-wt/
          skip-existing: true

  publish-tracker:
    name: publish ai-hats-tracker (PyPI trusted publishing)
    # Core first — ai-hats-tracker depends on it (parallel with publish-wt).
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi-tracker
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: packages-dist
      - name: Publish ai-hats-tracker to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-tracker/
          skip-existing: true

  verify-remote-install:
    # HATS-943 #2: reproduce the remote channel post-publish — a fresh venv
    # resolves ai-hats-core from PyPI (not the workspace) and imports the module
    # HATS-937 crashed on. Fails a skewed release loudly instead of DOA installs.
    # Retries tolerate PyPI CDN propagation lag right after upload.
    name: verify remote-channel install (post-publish)
    needs: [publish-wt, publish-tracker]
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Fresh venv + remote install + import
        run: |
          set -euo pipefail
          ok=""
          for attempt in 1 2 3 4 5; do
            rm -rf /tmp/verify-venv
            uv venv --python 3.11 /tmp/verify-venv
            if uv pip install --python /tmp/verify-venv/bin/python --refresh \
                 "ai-hats @ git+https://github.com/${{ github.repository }}.git"; then
              ok=1; break
            fi
            echo "install attempt $attempt failed (PyPI CDN lag?) — retry in 20s" >&2
            sleep 20
          done
          test -n "$ok" || { echo "remote install never succeeded" >&2; exit 1; }
          /tmp/verify-venv/bin/python -c \
            "import ai_hats_core.migrations; import ai_hats_tracker; import ai_hats; print('remote-channel OK')"
