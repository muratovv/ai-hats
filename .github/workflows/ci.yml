name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: ruff check
        run: bash scripts/ci-local.sh lint

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps
        run: pip install uv -e packages/ai-hats-core -e packages/ai-hats-library -e packages/ai-hats-observe -e packages/ai-hats-rack -e packages/ai-hats-tracker -e packages/ai-hats-wt -e packages/surfaces/agy -e packages/surfaces/cline -e ".[dev]"
      - name: Run unit suite across versions
        run: bash scripts/ci-local.sh unit

  coverage:
    # Authoritative coverage gate. Runs the unit suite PLUS the real-git
    # integration tests (excluding the e2e tier, which builds per-session
    # venvs and would add ~15min). Those integration tests exercise
    # worktree.py / state.py — modules barely touched by the unit suite —
    # lifting total coverage from ~76% (unit-only) to ~83% (HATS-600).
    name: coverage (py3.13, unit + real-git integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package + dev deps
        run: pip install uv -e packages/ai-hats-core -e packages/ai-hats-library -e packages/ai-hats-observe -e packages/ai-hats-rack -e packages/ai-hats-tracker -e packages/ai-hats-wt -e packages/surfaces/agy -e packages/surfaces/cline -e ".[dev]"
      - name: Configure git identity (integration tests commit/merge)
        run: |
          git config --global user.email "ci@ai-hats.test"
          git config --global user.name "ai-hats CI"
          git config --global init.defaultBranch main
      - name: Run unit + non-e2e integration with coverage gate
        run: bash scripts/ci-local.sh coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package + security tools
        run: pip install uv -e packages/ai-hats-core -e packages/ai-hats-library -e packages/ai-hats-observe -e packages/ai-hats-rack -e packages/ai-hats-tracker -e packages/ai-hats-wt -e packages/surfaces/agy -e packages/surfaces/cline -e ".[dev]"
      - name: Bandit SAST (fail on medium+ severity) + pip-audit
        run: bash scripts/ci-local.sh security

  install-smoke:
    name: install-smoke (launcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run install-launcher.sh
        run: bash scripts/install-launcher.sh
      - name: Verify launcher is executable and on disk
        run: |
          test -x "$HOME/.local/bin/ai-hats"
          file "$HOME/.local/bin/ai-hats"
          head -5 "$HOME/.local/bin/ai-hats"
      - name: Re-run is idempotent (skip path)
        run: |
          out=$(bash scripts/install-launcher.sh)
          echo "$out"
          echo "$out" | grep -q "already current"

  merge-smoke:
    # HATS-783: the curated e2e SMOKE subset, enforced server-side on every
    # push/PR to master. The other CI jobs `--ignore=tests/e2e/`, so the e2e
    # tier is otherwise enforced ONLY by the local ~27-min pre-push gate
    # (bypassable via --no-verify / forged marker). This runs just the
    # `smoke`-tagged e2e tests — hand-picked fast, deterministic, network-free
    # and auth-free (no install_heavy / live_claude / per-session venv build) so
    # they finish in minutes on a hosted runner. Complements, never replaces,
    # the full local gate. HATS-785 makes this a required status check.
    name: merge-smoke (curated e2e subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package + dev deps
        run: pip install uv -e packages/ai-hats-core -e packages/ai-hats-library -e packages/ai-hats-observe -e packages/ai-hats-rack -e packages/ai-hats-tracker -e packages/ai-hats-wt -e packages/surfaces/agy -e packages/surfaces/cline -e ".[dev]"
      - name: Configure git identity (e2e tests create/commit projects)
        run: |
          git config --global user.email "ci@ai-hats.test"
          git config --global user.name "ai-hats CI"
          git config --global init.defaultBranch main
      - name: Run curated e2e smoke subset
        run: bash scripts/ci-local.sh merge-smoke

  version-skew-guard:
    # HATS-943: block the HATS-923/937 skew class — a `packages/<pkg>/src/**`
    # change whose version isn't bumped above the published PyPI wheel. Runs on
    # PRs (base = merge-base) AND direct pushes to master (base = event.before,
    # the pre-merge tip) so the direct `wt merge` → push flow is covered too.
    name: version-skew-guard (workspace pkgs vs PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install packaging
        run: pip install "packaging>=23.0"
      - name: Resolve diff base
        id: base
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD~1)"
          fi
          echo "sha=$base" >> "$GITHUB_OUTPUT"
      - name: Check workspace packages are ahead of PyPI
        run: python scripts/check_pkg_version_skew.py "${{ steps.base.outputs.sha }}"
