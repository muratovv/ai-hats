# Read-only "what would the agent see" pipeline.
#
# Composes the active (or --role-overridden) role, renders it through
# the provider's build_system_prompt, prints the result to stdout.
# No session created, no provider spawned, no file written — pure
# preview. Surface: `ai-hats config show-prompt`.
#
# HATS-452 Phase 1: this pipeline is the canonical "materialization"
# probe, factored out of WrapRunner's inline compose+build. Phase 2
# (follow-up task) will rewire WrapRunner / SubAgentRunner /
# Assembler.set_role to ALSO go through MaterializeSystemPrompt, so the
# "what does the agent see" surface is single-source-of-truth.
name: preview
steps:
  - id: materialize_system_prompt
  - id: emit_stdout
    params:
      key: system_prompt_text
