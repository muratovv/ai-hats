name: scope-guard
description: Enforce user-defined task boundaries, prevent scope creep and over-implementation
author: ai-hats
tags: [agent-protocol, discipline, scope]
pattern: checklist

triggers:
  - "user defined a narrow scope and broader changes are tempting"
  - "noticing while-we're-at-it refactors creeping in"
  - "PR diff growing beyond the stated change"
  - "user pushes back on extra changes in a review"
skip:
  - "user explicitly invites expanded scope"
