name: context-reset
description: Clean context reset protocol — commit work, write handoff, update task card, inform supervisor
author: ai-hats
tags: [agent-protocol, memory, context-management]
pattern: protocol

triggers:
  - "context window approaching its limit"
  - "session has accumulated unrelated tangents"
  - "user signals context pressure or wants a fresh start"
  - "need to commit work and hand off cleanly mid-session"
skip:
  - "early in a session with plenty of headroom"
