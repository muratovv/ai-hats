name: backlog-manager
description: Task lifecycle orchestration via YAML cards (brainstormâ†’planâ†’executeâ†’documentâ†’reviewâ†’done)
author: ai-hats
tags: [agent-protocol, task-management, orchestration]
pattern: orchestrator

# Skill-contributed git hooks (HATS-088 framework). The assembler installs
# these into the project's .githooks/<event>.d/ at composition time.
git_hooks:
  pre-commit:
    - git_hooks/pre-commit-attachments.sh

triggers:
  - "creating, updating, or transitioning a task card"
  - "user mentions task ID or state machine (brainstorm/plan/execute/document/review/done)"
  - "syncing STATE.md after task changes"
  - "logging work progress on an existing task"
skip:
  - "in-session todo lists (use TaskCreate instead)"
