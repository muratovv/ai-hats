name: requirements-interview
description: The Requirements stage of the plan-gate — fills plan.md's Requirements section via cited best-guess Q&A reviewed by the supervisor
author: ai-hats
tags: [agent-protocol, planning, requirements, plan-gate-stage]
pattern: checklist

triggers:
  - "plan-gate routed you to fill the Requirements section of plan.md"
  - "the Requirements section is empty and requirements are vague"
  - "acceptance criteria are missing or ambiguous in a plan being drafted"
skip:
  - "requirements already nailed down in the request"
  - "task is past plan — the gate has already passed"
