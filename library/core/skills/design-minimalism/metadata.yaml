name: design-minimalism
description: At plan stage, every primitive must be justified by a concrete use case in the current epic — speculative additions go to Out of scope
author: ai-hats
tags: [agent-protocol, planning, design, scope]
pattern: checklist

triggers:
  - "transitioning a task from brainstorm to plan"
  - "writing or revising plan.md"
  - "noticing urge to future-proof or add for completeness"
  - "proposed design contains classes/options/steps without current-epic use case"

skip:
  - "trivial single-file edit with no design surface"
  - "implementation-stage refactor inside an already-approved plan"
