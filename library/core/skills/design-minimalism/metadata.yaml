name: design-minimalism
description: The Scope & Out-of-scope stage of the plan-gate — every primitive must be justified by a concrete current-epic use case; speculative additions go to Out of scope
author: ai-hats
tags: [agent-protocol, planning, design, scope, plan-gate-stage]
pattern: checklist

triggers:
  - "plan-gate routed you to fill the Scope & Out-of-scope section of plan.md"
  - "a plan being drafted proposes classes/options/steps without a current-epic use case"
  - "noticing urge to future-proof or add for completeness"

skip:
  - "trivial single-file edit with no design surface"
  - "implementation-stage refactor inside an already-approved plan"
