name: webapp-testing
description: "Verify a local web app actually renders and behaves in a real browser via Playwright — start the dev server, drive a headless browser, assert on DOM/visible text/navigation, check console errors, capture screenshots. Use as the task_complete gate for any UI change, or to debug 'it compiles but the page is broken'."
author: ai-hats
tags: [web, testing, playwright, frontend, verification]
pattern: checklist

triggers:
  - "finished a UI change and need to confirm it works in a browser"
  - "unit tests pass but the page may be visually or behaviorally broken"
  - "debugging routing, event handlers, hydration, or console errors"
  - "task_complete verification gate for a frontend task"
skip:
  - "backend/library code with no rendered surface"
  - "a headless unit/integration test already exercises the exact behavior"

