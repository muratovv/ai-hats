name: rule-delivery-gate
description: Rule-delivery contract gate — pre-commit check that staged trait/role injections never point `see rule X` at a rule the agent cannot read (maintainer / role-curator)
author: ai-hats
tags: [library, quality-gate, hooks, automation, ci]
pattern: reference

# HATS-700 — hook-carrier skill. The assembler installs the script below into
# `.githooks/pre-commit.d/` at composition time. When a commit stages any
# `library/**/config.yaml` (trait/role injection), it runs
# `python -m ai_hats.rule_delivery library` (the G2 invariant as a pure
# function) and blocks the commit if a `see rule X` pointer names a rule that is
# neither always-on nor registered in SUMMARIZED_IN_INJECTION. Fail-open if
# python / ai_hats is absent; per-commit override `AI_HATS_RULE_DELIVERY_ACK=1`.
#
# Scoped to library-authoring roles via the `skill-engineer` trait (composed only
# by `maintainer` + `role-curator`). CI runs the same invariant as a unit test
# (G2) on every PR/push to master.
git_hooks:
  pre-commit:
    - git_hooks/pre-commit-rule-delivery.sh

# No `triggers:` — this skill exposes no agent-side decision logic. It is pure
# infrastructure delivered through composition (cf. skill-lint-gate).
