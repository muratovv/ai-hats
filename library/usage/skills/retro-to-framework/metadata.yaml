name: retro-to-framework
description: Convert project retrospective findings into framework-level improvements (rules, skills, skill updates)
author: ai-hats
tags: [meta, improvement, retrospective, cross-project]
pattern: protocol

triggers:
  - "after writing a project retrospective"
  - "user wants to convert local findings into rule or skill updates"
  - "promoting recurring patterns into reusable framework components"
skip:
  - "single-project tweak with no cross-project value"
