name: skill-lint-gate
description: SKILL.md lint gate — pre-commit agnix validation of staged library skills (maintainer / role-curator)
author: ai-hats
tags: [library, quality-gate, hooks, automation, ci]
pattern: reference

# HATS-617 — hook-carrier skill. The assembler installs the script below into
# `.githooks/pre-commit.d/` at composition time. It lints STAGED
# `library/**/SKILL.md` (excluding the golang-* pack) with agnix against the
# repo-root `.agnix.toml`, and blocks the commit on agnix errors. Fail-open if
# agnix/node is absent; per-commit override `AI_HATS_SKILL_LINT_ACK=1`.
#
# Scoped to skill-authoring roles via the `skill-engineer` trait (composed only
# by `maintainer` + `role-curator`). The CI counterpart is HATS-627.
git_hooks:
  pre-commit:
    - git_hooks/pre-commit-skill-lint.sh

# No `triggers:` — this skill exposes no agent-side decision logic. It is pure
# infrastructure delivered through composition (cf. maintainer-quality-gate).
