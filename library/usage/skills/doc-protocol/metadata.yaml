name: doc-protocol
description: Plan-stage style forks + scope triage + pre-commit artifact verification for documentation tasks
author: ai-hats
tags: [documentation, planning, style, verification]
pattern: checklist

triggers:
  - "task changes docs/*.md, README.md, CONTRIBUTING.md, how-to-*.md, ARCHITECTURE.md"
  - "task lifts structure from a precedent doc"
  - "task description enumerates ≥6 items (components/sections/recipes/fixtures)"
  - "task adds or renames code-side artifact names (skills/roles/paths/CLI)"

skip:
  - "trivial single-paragraph edit or typo fix"
  - "non-doc task that only references doc paths"
