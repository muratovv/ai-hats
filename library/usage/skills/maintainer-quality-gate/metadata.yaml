name: maintainer-quality-gate
description: Maintainer-only quality gates — pre-push e2e+smoke when pushing to master
author: ai-hats
tags: [maintainer, quality-gate, hooks, testing]
pattern: reference

# HATS-550 / HATS-686 — hook-carrier skill. The assembler installs the
# dual-mode script below into `.githooks/pre-push.d/` at composition time.
#
# The ~27-min suite must NOT run inside pre-push (GitHub closes the SSH push
# connection ~30s in → exit 141; HATS-684). So the script is decoupled:
#   * default (git pre-push): INSTANT check that a green pass-marker keyed to
#     the pushed master `local_sha` exists; block otherwise.
#   * `--run` (via scripts/run-e2e-gate.sh): runs the suite out of band and,
#     on pass + clean tree, writes the marker keyed to HEAD's SHA.
# Hard gate: no env-var bypass. `git push --no-verify` (disables every other
# hook on the chain too) stays the only normal escape — accepted tradeoff.
git_hooks:
  pre-push:
    - git_hooks/pre-push-e2e-master.sh

# No `triggers:` — this skill exposes no agent-side decision logic.
# It is pure infrastructure delivered through composition.
