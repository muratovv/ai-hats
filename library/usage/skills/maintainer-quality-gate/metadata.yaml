name: maintainer-quality-gate
description: Maintainer-only quality gates — pre-push e2e+smoke when pushing to master
author: ai-hats
tags: [maintainer, quality-gate, hooks, testing]
pattern: reference

# HATS-550 — hook-carrier skill. The assembler installs the script below
# into `.githooks/pre-push.d/` at composition time. When the push target
# includes `refs/heads/master`, the hook runs:
#   pytest -m "integration or smoke" tests/e2e/ tests/smoke/
# and blocks the push on failure. Hard gate: no env-var bypass. The user
# may still use `git push --no-verify` (which also disables every other
# hook on the chain) for hot-path overrides — accepted tradeoff.
git_hooks:
  pre-push:
    - git_hooks/pre-push-e2e-master.sh

# No `triggers:` — this skill exposes no agent-side decision logic.
# It is pure infrastructure delivered through composition.
