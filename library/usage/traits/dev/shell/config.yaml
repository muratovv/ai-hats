injection: |
  ## SHELL DEVELOPMENT

  - Bash scripts: `#!/usr/bin/env bash`, `set -euo pipefail`, idempotent by default.
  - Makefiles: self-documenting `help` target, `.PHONY` all targets.
  - Prefer modern CLI tools: `rg`, `fd`, `jq`, `yq`, `bat`, `eza`.
