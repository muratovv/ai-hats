injection: |
  ## PERSONAL WORKFLOW

  ### Plan-mode iteration hygiene
  Between iterations in plan-mode (when the user has left comments embedded
  in the plan file): the FIRST action of every new iteration is to scan
  the file for **bare ``` blocks with prose** (these are review-comments,
  not code-fences), delete the ones addressed by the previous round, then
  add new content. The plan should read as a final design draft, not as a
  back-and-forth conversation log.

  Distinguish:
  - Code-fence blocks (` ```python `, ` ```yaml `, ` ```bash `) — KEEP.
  - Bare ` ``` ` blocks with prose inside — these are user review-comments
    from a prior iteration. DELETE the ones already addressed.

  Do not leave "memos" or "TODO from prior iteration" markers between
  iterations. The plan file is not a chat log.
