[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-hats"
dynamic = ["version"]
description = "Framework for composing and managing AI agents through composite roles"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "rich>=13.0",
    "filelock>=3.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.4",
]
costs = [
    "anthropic>=0.40",
]
aggregation = [
    "rapidfuzz>=3.0",
]

[project.scripts]
ai-hats = "ai_hats.cli:main"

[tool.setuptools_scm]
version_file = "src/ai_hats/_version.py"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ai_hats = ["libraries/**/*", "templates/**/*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    # Python 3.14 deprecates forkpty() in multi-threaded processes.
    # Our PTY tests (test_observe.py) use pty.spawn() which calls forkpty()
    # internally — there is no alternative API in stdlib. Safe to suppress
    # until pty.spawn is updated upstream.
    "ignore:.*use of forkpty.*:DeprecationWarning",
]
markers = [
    "integration: tests that spawn real subprocesses or use real PTY",
    "smoke: lightweight real-path tests run by the pre-commit smoke gate on integration tasks",
]
