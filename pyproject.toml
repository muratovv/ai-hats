[build-system]
requires = ["setuptools>=77.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-hats"
dynamic = ["version"]
description = "Framework for composing and managing AI agents through composite roles"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "muratovv", email = "f@muratovv.me" },
]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "rich>=13.0",
    "filelock>=3.12",
    "ptyprocess>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.4",
    "bandit>=1.7",
    "pip-audit>=2.7",
]
costs = [
    "anthropic>=0.40",
]
aggregation = [
    "rapidfuzz>=3.0",
]

[project.scripts]
ai-hats = "ai_hats.cli:main_entry"

[tool.setuptools_scm]
version_file = "src/ai_hats/_version.py"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ai_hats = ["libraries/**/*", "templates/**/*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    # Python 3.14 deprecates forkpty() in multi-threaded processes.
    # ptyprocess (used by WrapRunner._pty_spawn and exercised in test_observe.py)
    # ultimately calls pty.fork() → os.forkpty(). Safe to suppress until
    # ptyprocess switches to the os.fork() + openpty() fallback path.
    "ignore:.*use of forkpty.*:DeprecationWarning",
]
markers = [
    "integration: tests that spawn real subprocesses or use real PTY",
    "smoke: lightweight real-path tests run by the pre-commit smoke gate on integration tasks",
]

[tool.coverage.run]
source = ["ai_hats"]
branch = false

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv", "build", "dist"]
