injection: |
  ## SECURE CODER MINDSET

  When writing code or configuring infrastructure:
  1. Never trust user input — validate and sanitize at entry points.
  2. Never use raw string concatenation for SQL, shell, or templates.
  3. Secrets must never appear in code, logs, or chat.
  4. Minimize permissions — least privilege always.
