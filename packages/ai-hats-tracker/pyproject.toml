[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-hats-tracker"
version = "0.6.0"
description = "Standalone task-card schema, worktree-free task FSM, and backlog CLI for the ai-hats framework (TaskCard + TaskManager + `task`/`attach`)."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "muratovv", email = "f@muratovv.me" }, # ai-hats: allow-secret
]
keywords = ["backlog", "task", "state-machine", "tracker", "ai-hats"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "ai-hats-core>=0.5.0",  # + ai_hats_core.paths.default_project_dir (shared wt-free resolver, HATS-952)
    "click>=8.1",  # backlog CLI (HATS-934)
    "filelock>=3.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",  # backlog CLI console output (HATS-934)
]

# The backlog CLI soft-imports ai_hats_wt for its worktree UX; install the extra
# (or let the ai-hats integrator inject it) to enable it. Never a hard dep — the
# CLI runs wt-free without it (HATS-934).
[project.optional-dependencies]
wt = ["ai-hats-wt>=0.2.1"]

# ADR-0016: expose ``ai-hats-tracker`` on PATH so a skill's neutral
# ``requires.cli: ai-hats-tracker`` (e.g. backlog-manager) is satisfiable — the
# engine is a provided tool, not a passenger of the skill.
[project.scripts]
ai-hats-tracker = "ai_hats_tracker.cli.main:main"

[project.urls]
Homepage = "https://github.com/muratovv/ai-hats"
Repository = "https://github.com/muratovv/ai-hats"
Changelog = "https://github.com/muratovv/ai-hats/blob/master/packages/ai-hats-tracker/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_hats_tracker"]

[tool.uv.sources]
ai-hats-core = { workspace = true }
ai-hats-wt = { workspace = true }
