[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-hats-tracker"
version = "0.1.0"
description = "Standalone task-card schema + worktree-free task FSM for the ai-hats framework (TaskCard + TaskManager)."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "muratovv", email = "f@muratovv.me" }, # ai-hats: allow-secret
]
keywords = ["backlog", "task", "state-machine", "tracker", "ai-hats"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "ai-hats-core>=0.4.0",  # imports ai_hats_core.migrations (seam); 0.4.0 on PyPI (HATS-937)
    "click>=8.1",  # backlog CLI (HATS-934)
    "filelock>=3.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",  # backlog CLI console output (HATS-934)
]

[project.urls]
Homepage = "https://github.com/muratovv/ai-hats"
Repository = "https://github.com/muratovv/ai-hats"
Changelog = "https://github.com/muratovv/ai-hats/blob/master/packages/ai-hats-tracker/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_hats_tracker"]

[tool.uv.sources]
ai-hats-core = { workspace = true }
