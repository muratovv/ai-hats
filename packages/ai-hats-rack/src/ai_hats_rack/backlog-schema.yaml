# backlog-schema.yaml — language-independent grammar for backlog.yaml (HATS-1043,
# ADR-0017). SINGLE authority for the key grammar: definition.py loads its allow-
# sets from `keys`, and an external linter (any language) checks backlog.yaml ↔
# code bindings against this file. `priorities` is documentation-as-data — nothing
# reads it for dispatch; the `priority:` pins in backlog.yaml stay the authority.

# Allowed keys per structural level — the loader's fail-closed allow-sets.
keys:
  # `cli_alias` — a backlog's short `rack` group name (its `name` when unset), so
  # the verbs layer never hardcodes per-backlog knowledge (HATS-1036).
  top: [name, prefix, cli_alias, fsm, links, extensions, fields, extras]
  fsm: [initial, states, edges]
  state: [name, on_enter, on_exit]
  edge: [from, to, name, handlers, skip]
  links: [kinds]
  # `targets:` names the backlog a cross-backlog kind points at (HATS-1044);
  # unset means the kind's own backlog. `read`/`read_docs` — read-phase enricher
  # handlers + surfaced doc names per kind (HATS-1064).
  kind: [name, arity, inverse, derived, aliases, handlers, targets, read, read_docs]
  # A card-field entry (HATS-1035): `type` is str|int|list|any; a complex shape
  # is `type: any` + a mandatory `validator`. `emit` is always|when-set.
  field: [name, type, default, required, choices, validator, emit]

# A handler reference is a bare name or a {name, ...} mapping. The universal keys
# are interpreted by the composition root; ANY other key is handler-specific config
# passed verbatim to the factory (e.g. stamp-lifecycle reads `field`).
handler_ref:
  universal: [name, priority, timeout]
  extra_keys: config-passthrough

# Keys the grammar reserves for a future owner: the loader rejects them
# fail-closed, naming the owning task, instead of parsing them as unknown.
reserved: {}

# In-lock priority chain (documentation-as-data). Lower fires first; an unpinned
# reference takes a positional band from band_start, stepping band_step.
priorities:
  slots:
    single-slot: 5
    frozen-integrity: 8
    plan-consent: 9
    plan-gate: 10
    stamp-lifecycle: 12
    hook-runner: 15
    ownership-claim: 20
    plan-scaffold: 30
    worktree: 30
    ownership-release: 40
  band_start: 100
  band_step: 10
