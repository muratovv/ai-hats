# Link-kind registry (HATS-1028) — the open, per-backlog set of edge kinds.
#
# The kernel and models stay kind-blind: THIS file (or a project-root
# links.yaml override) is the SSOT for what edges a backlog understands.
# Semantics are bound from ABOVE by extensions (epic-automation reads the
# hierarchy kind); this file declares only structure, so data compatibility
# holds with zero migration.
#
# Per kind:
#   name      the kind identifier — ALSO its task.yaml storage field (HATS-1032):
#             a name that is a dedicated link field (parent_task/depends_on/...)
#             reads/writes that field; any other name lands in the generic
#             `links:` key. Used by `--link <name>:<id>` and the links outputs.
#   arity     one (scalar id) | many (list of ids). Default: many.
#   inverse   the reverse kind's name; inverse == name marks a symmetric
#             kind (metadata only — bidirectional writes are not enforced).
#   derived   true → computed as the reverse of `inverse`, never stored.
#   aliases   forgiving spellings accepted by `--link <name>` (PROP-042).
#
# Declaration order is the output order (context/ls): most salient first,
# derived kinds last, so a dedup across kinds keeps the more salient edge.
kinds:
  - name: parent_task
    arity: one
    inverse: children
  - name: depends_on
    arity: many
    aliases: [depends]
  - name: related
    arity: many
    inverse: related
  - name: children
    derived: true
    inverse: parent_task
