# ai_hats_rack/backlog.yaml — packaged default: the tasks backlog (kernel CONTRACT).
#
# Lossless fold (HATS-1042, ADR-0017 §1/§6) of fsm.yaml (states + adjacency) and
# links.yaml (kinds) into the single backlog definition every module is built
# from. This file is the kernel CONTRACT, not user config: editing it changes the
# event vocabulary for every consumer. Handler/field/extension sections are
# deliberately absent — they land in the successor tasks (fields HATS-1035,
# handler slots HATS-1043, multi-backlog HATS-1044); a fold that declared them
# would be an inert gate, which the loader rejects fail-closed.
name: tasks
prefix: HATS # instance override: ai-hats.yaml task_prefix (unchanged)

fsm:
  initial: brainstorm
  states:
    - { name: brainstorm }
    - { name: plan }
    - { name: execute }
    - { name: document } # PROP-012: companion-HYP timing anchors here (fsm._validate enforces)
    - { name: review }
    - { name: done }
    - { name: blocked } # pause hub: reachable from every working state, returns into them
    - { name: failed }
    - { name: cancelled } # the only true dead end (administrative close)
  edges:
    - { from: brainstorm, to: plan }
    - { from: brainstorm, to: blocked }
    - { from: brainstorm, to: cancelled }
    - { from: plan, to: execute }
    - { from: plan, to: blocked }
    - { from: plan, to: cancelled }
    - { from: execute, to: execute, name: reclaim } # HATS-955: gated by ownership (K3), not the FSM
    - { from: execute, to: document }
    - { from: execute, to: blocked }
    - { from: execute, to: failed }
    - { from: execute, to: cancelled }
    - { from: document, to: review }
    - { from: document, to: blocked }
    - { from: document, to: cancelled }
    - { from: review, to: done }
    - { from: review, to: failed }
    - { from: review, to: cancelled }
    - { from: blocked, to: brainstorm }
    - { from: blocked, to: plan }
    - { from: blocked, to: execute }
    - { from: blocked, to: document }
    - { from: blocked, to: cancelled }
    - { from: failed, to: brainstorm }
    - { from: failed, to: cancelled }
    - { from: done, to: execute, name: reopen } # HATS-328: reopen for epic close-out / forgotten scope

links:
  kinds:
    - { name: parent_task, arity: one, inverse: children }
    - { name: depends_on, arity: many, aliases: [depends] }
    - { name: related, arity: many, inverse: related }
    - { name: children, derived: true, inverse: parent_task }
