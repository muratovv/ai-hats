[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-hats-core"
version = "0.3.0"
description = "Core primitives and shared mechanisms for the ai-hats framework — minimal deps, each load-bearing."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "muratovv", email = "f@muratovv.me" }, # ai-hats: allow-secret
]
keywords = ["atomic-write", "filesystem", "os.replace", "ai-hats"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    # Each dep individually sanctioned: pydantic — base of the model layer
    # (HATS-862 F2); filelock — cross-process lock primitive (HATS-526).
    "pydantic>=2.0",
    "filelock>=3.12",
]

[project.urls]
Homepage = "https://github.com/muratovv/ai-hats"
Repository = "https://github.com/muratovv/ai-hats"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_hats_core"]
