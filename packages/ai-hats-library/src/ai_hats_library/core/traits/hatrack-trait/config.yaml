injection: |
  ### Backlog manager: rack (hatrack)

  Rack (hatrack) is the **default** backlog manager for agent sessions (composed
  via `trait-agent`); this trait is retained as the explicit-selection / rollback
  anchor until the classic `backlog-manager` is retired. This session drives the
  **whole backlog** through the **rack** CLI — see skill `hatrack`. Lifecycle /
  reads / documents / links → `rack <verb>`; field edits
  (title/description/priority/reviewer/role/tags/re-parent) → `rack transition
  --set`; `close` → forced `rack transition --state done --force`; `plan-extract`
  → `rack plan-extract`; hypotheses / proposals → the `rack hyp` / `rack proposal`
  groups. Same FSM, same `task.yaml`, same per-task lock as the classic manager.
