name: reflect-all
steps:
  - id: compose_role
  - id: resolve_prompt
    params: {default_text: ""}
  - id: launch_provider
    # HATS-378: judge is a reporting role; same opt-in as reflect-role.
    harness:
      reporting: true
      on_zero_output: harness_incident
  - id: extract_marker
    params: {start: BEGIN_JUDGE, end: END_JUDGE, out_key: judge_report}
  - id: save_artifact
    params:
      key: judge_report
      out_path_template: "<ai_hats_dir>/sessions/retros/judge/{ts}-report.md"
