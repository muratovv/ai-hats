[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-hats-observe"
version = "0.1.0"
description = "Session logging engine for the ai-hats framework — session lifecycle, versioned trace/audit schema, and a surface-agnostic transcript-parser adapter."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "muratovv", email = "f@muratovv.me" }, # ai-hats: allow-secret
]
keywords = ["observability", "session", "audit", "trace", "transcript", "ai-hats"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    # imports ai_hats_core.session_artifacts (0.5.0, HATS-948); slices 3-4 add
    # TraceTag/ENV_SESSION_ID + RecoveryProtocol to the same core minor.
    "ai-hats-core>=0.5.0",
]

[project.urls]
Homepage = "https://github.com/muratovv/ai-hats"
Repository = "https://github.com/muratovv/ai-hats"
Changelog = "https://github.com/muratovv/ai-hats/blob/master/packages/ai-hats-observe/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_hats_observe"]

[tool.uv.sources]
ai-hats-core = { workspace = true }
